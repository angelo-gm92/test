<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Inicio - Test de Habilidades</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f5;
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 1100px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    /* Imagen izquierda */
    .left {
      width: 50%;
      background: #e5e7eb;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Contenido derecho */
    .right {
      width: 50%;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 25px;
    }

    .right h1 {
      font-size: 32px;
      line-height: 1.3;
    }

    .right p {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.5;
    }

    .btn-start {
      width: fit-content;
      background: #2563eb;
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-start:hover {
      background: #1d4ed8;
      transform: scale(1.03);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left, .right {
        width: 100%;
      }

      .left {
        height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="left">
      <!-- Reemplaza "tu-imagen.png" por el nombre real de tu archivo -->
      <img src="/ChatGPT Image May 22, 2026, 06_41_03 PM" alt="Imagen de presentación">
    </div>

    <div class="right">
      <h1>Bienvenido al Test de Habilidades</h1>
      <p>
        Esta prueba te permitirá evaluar diferentes áreas de tus capacidades de manera rápida y sencilla.
        Prepárate para responder una serie de preguntas diseñadas para medir tu nivel actual.
      </p>

      <button class="btn-start">Comenzar prueba</button>
    </div>
  </div>
</body>
</html>
