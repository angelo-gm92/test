<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario Interactivo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f5;
      color: #111827;
    }

    .container_questions {
      width: 90%;
      max-width: 500px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    .progress {
      margin-bottom: 30px;
      font-size: 14px;
      color: #6b7280;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 25px;
      line-height: 1.3;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    button.option {
      border: none;
      background: #f3f4f6;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
    }

    button.option:hover {
      background: #111827;
      color: white;
      transform: translateY(-2px);
    }

    .fade-out {
      opacity: 0;
      transform: translateY(10px);
    }

    .result {
      text-align: center;
    }

    .result h1 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    .result p {
      color: #6b7280;
    }

    /* Estilos para el botón de resultado final */
    .btn-resultado {
      border: none;
      background: #2563eb;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 15px;
    }

    .btn-resultado:hover {
      background: #1d4ed8;
      transform: scale(1.02);
    }

    /* Lista de notas por rubro */
    .notas-lista {
      text-align: left;
      margin-top: 25px;
      background: #f8fafc;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .notas-lista li {
      list-style: none;
      padding: 8px 0;
      border-bottom: 1px solid #edf2f7;
      display: flex;
      justify-content: space-between;
      text-transform: capitalize;
    }

    .notas-lista li:last-child {
      border-bottom: none;
    }
  </style>
</head>

<body>

  <div class="container_questions">
    <div class="card" id="card">

      <div class="progress" id="progress">
        Pregunta 1 de 3
      </div>

      <h2 id="question">
        Dimensión analítica
      </h2>

      <div class="options" id="options"></div>

    </div>
  </div>

  <script>

    // Objeto para acumular los puntos de cada rubro
    const puntajes = {
      analitico: 0,
      visual: 0,
      experiencial: 0,
      auditivo: 0,
      kinestesico: 0
    };


    const questions = [
      {
        question: "Cuando aprendes algo complejo:",
        options: [
          { text: "Necesito representaciones visuales", rubro: "visual" },
          { text: "Prefiero explicaciones verbales", rubro: "auditivo" },
          { text: "Necesito practicarlo directamente", rubro: "kinestesico" },
          { text: "Necesito comprender toda la lógica", rubro: "analitico" }
        ]
      },

      {
        question: "Cuando resuelves problemas:",
        options: [
          { text: "Visualizo situaciones.", rubro: "visual" },
          { text: "Converso posibles soluciones.", rubro: "auditivo" },
          { text: "Experimento distintas opciones.", rubro: "experiencial" },
          { text: "Analizo patrones y estructuras.", rubro: "analitico" }
        ]
      },

      {
        question: "¿Qué describe mejor tu forma de aprender?",
        options: [
          { text: "Muy visual", rubro: "visual" },
          { text: "Muy verbal", rubro: "auditivo" },
          { text: "Muy práctica", rubro: "experiencial" },
          { text: "Muy lógica", rubro: "analitico" }
        ]
      }
    ];

    let currentQuestion = 0;
    const answers = [];

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const progressEl = document.getElementById("progress");
    const cardEl = document.getElementById("card");

    function renderQuestion() {
      const q = questions[currentQuestion];

      progressEl.textContent =
        `Pregunta ${currentQuestion + 1} de ${questions.length}`;

      questionEl.textContent = q.question;

      optionsEl.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");

        btn.classList.add("option");
        btn.textContent = option.text;

        btn.addEventListener("click", () => {

          // Corregido: Suma un punto al rubro dinámicamente
          if (puntajes[option.rubro] !== undefined) {
            puntajes[option.rubro]++;
          }

          // btn.addEventListener("click", () => {
          //   answers.push(option);

          cardEl.classList.add("fade-out");

          setTimeout(() => {
            currentQuestion++;

            if (currentQuestion < questions.length) {
              renderQuestion();
              cardEl.classList.remove("fade-out");
            } else {
              showResult();
            }

          }, 300);
        });

        optionsEl.appendChild(btn);
      });
    }

    function showResult() {
      cardEl.classList.remove("fade-out");
      cardEl.innerHTML = `
        <div class="result">
          <h1>Formulario completado</h1>
          <p>Gracias por responder.</p> 
         <button type="button" class="btn-resultado" onclick="resultado()">Ver resultado</button>         
<div id="nota"></div>
</div>
`;
    }


    function resultado() {
      const notaEl = document.getElementById("nota");
      let HTMLResultados = `<ul class="notas-lista">`;

      for (const rubro in puntajes) {
        HTMLResultados += `
  <li>
      <strong>${rubro}:</strong>
      <span>${puntajes[rubro]} pts</span>
    </li>`;
      }

      HTMLResultados += `</ul>`;
      notaEl.innerHTML = HTMLResultados;

      const btn = document.querySelector(".btn-resultado");
      if (btn) btn.style.display = "none";
    }

    renderQuestion();
  </script>
</body>

</html>
